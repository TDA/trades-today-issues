name: "UI/UX Feedback"
description: Share feedback about the user interface or user experience of Trades Today.
title: "[UI/UX]: "
labels: ["ui/ux"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve the look and feel of Trades Today! Share your feedback on the user interface or experience.

  - type: dropdown
    id: app-section
    attributes:
      label: App Section
      description: Which section of the app does this feedback relate to?
      options:
        - Dashboard
        - Trade Execution
        - Portfolio / Positions
        - Watchlist
        - Charts / Technical Analysis
        - Alerts / Notifications
        - Settings
        - Overall Navigation
        - Other
    validations:
      required: true

  - type: dropdown
    id: feedback-type
    attributes:
      label: Feedback Type
      description: What kind of UI/UX feedback is this?
      options:
        - Layout / Design
        - Usability / Workflow
        - Accessibility
        - Performance / Responsiveness
        - Mobile Experience
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Feedback Description
      description: Describe your feedback in detail.
      placeholder: What would you like to see improved?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Mockups
      description: If applicable, add screenshots or mockups to illustrate your feedback.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about your feedback.
    validations:
      required: false
