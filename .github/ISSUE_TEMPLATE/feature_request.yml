name: "Feature Request"
description: Suggest a new feature or improvement for Trades Today.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate your ideas! Please describe the feature you'd like to see.

  - type: dropdown
    id: app-section
    attributes:
      label: App Section
      description: Which section of the app would this feature apply to?
      options:
        - Dashboard
        - Trade Execution
        - Portfolio / Positions
        - Watchlist
        - Charts / Technical Analysis
        - Alerts / Notifications
        - Settings
        - New Section
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: Is your feature request related to a problem? Describe it.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: Describe your ideal solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request.
    validations:
      required: false
